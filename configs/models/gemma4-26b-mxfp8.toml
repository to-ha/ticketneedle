# Gemma 4 26B, MLX MXFP8, text-only, 256k context.
# Size-axis: 24 GB-class — counterpart to qwen3.5-27b-128k (Q4) but with
# larger 256k context (vs qwen 128k) — could matter for large_150.
# See gemma4-e2b-mxfp8 for shared Gemma 4 caveats.
name = "gemma4-26b-mxfp8"
suppress_thinking = true

[client]
base_url = "http://localhost:11434"
model = "gemma4:26b-mxfp8"
api_key = "not-needed"
temperature = 0.0
max_tokens = 2000
timeout = 1800
stop = ["\n---", "\nTask:", "\nRules:"]
