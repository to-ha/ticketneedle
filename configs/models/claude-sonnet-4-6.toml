# Anthropic Claude Sonnet 4.6 via the OpenAI-compatible shim.
# Anthropic Tier 1 = 30k input-tokens-per-minute. small_30 is ~30k tokens
# per call, so honor pacing on multi-call runs (handled by --pacing on CLI
# or in the corpus config).
name = "claude-sonnet-4-6"
suppress_thinking = false

[client]
base_url = "https://api.anthropic.com"
model = "claude-sonnet-4-6"
api_key = "file:.secrets/anthropic.key"
temperature = 0.0
max_tokens = 1500
timeout = 600
